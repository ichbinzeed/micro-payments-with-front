<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal de Micropagos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Alice <span class="badge">Pagadora</span></h1>
            <button id="connectWallet" class="btn-primary">
                <span class="icon">🔗</span> Conectar MetaMask
            </button>
        </header>

        <main class="card">
            <div class="card-header">
                <h3>Crear "Cheque" (Firma)</h3>
            </div>

            <div class="form-group">
                <label for="recipient">Dirección de Bob</label>
                <input type="text" id="recipient" placeholder="0x..." autocomplete="off">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="amount">Cantidad (ETH)</label>
                    <input type="number" id="amount" placeholder="0.01" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label for="nonce">Nonce</label>
                    <input type="number" id="nonce" placeholder="1" min="1">
                </div>
            </div>

            <button id="signBtn" class="btn-secondary">
                <span class="icon">✍️</span> Firmar Pago
            </button>
        </main>

        <section class="result-section">
            <p><strong>Resultado de la firma:</strong></p>
            <div class="textarea-wrapper">
                <textarea id="signatureResult" rows="4" readonly
                    placeholder="La firma generada aparecerá aquí..."></textarea>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
    <script src="ether.js" type="application/javascript"></script>
</body>

</html>
